robot:
  type: mecanum
  kinematics:
    wheel_diameter: 0.1016
    wheelbase_width: 0.3048
    wheelbase_length: 0.3048
    front_left_wheel: fl_motor
    front_right_wheel: fr_motor
    back_left_wheel: bl_motor
    back_right_wheel: br_motor
  limits:
    chassis:
      max_velocity: 2.0
      max_angular_velocity: 8.0
    wheels:
      max_angular_velocity: 100.0
      max_angular_acceleration: 1000.0

