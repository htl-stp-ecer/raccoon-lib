<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="420" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="26" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">R A C C O O N L I B  —  I N T E R N A L  A R C H I T E C T U R E</text>

  <!-- ═══ Layer 5: Robot & Mission API ═══ -->
  <rect x="40" y="40" rx="8" width="720" height="60" fill="#7c3aed"/>
  <circle cx="70" cy="62" r="12" fill="#6d28d9"/>
  <text x="70" y="67" text-anchor="middle" fill="#e9d5ff" font-size="12" font-weight="700">5</text>
  <text x="94" y="60" fill="#fff" font-size="13" font-weight="600">Robot &amp; Mission API</text>
  <text x="94" y="76" fill="#c4b5fd" font-size="11">GenericRobot · Mission · SetupMission · Python Bindings (pybind11)</text>
  <text x="750" y="60" text-anchor="end" fill="#a78bfa" font-size="10" font-style="italic">What you subclass</text>
  <text x="750" y="73" text-anchor="end" fill="#a78bfa" font-size="10" font-style="italic">and run</text>

  <!-- Arrow -->
  <polygon points="400,100 394,108 406,108" fill="#475569" opacity="0.6"/>

  <!-- ═══ Layer 4: Step Framework ═══ -->
  <rect x="40" y="112" rx="8" width="720" height="60" fill="#2563eb"/>
  <circle cx="70" cy="134" r="12" fill="#1d4ed8"/>
  <text x="70" y="139" text-anchor="middle" fill="#bfdbfe" font-size="12" font-weight="700">4</text>
  <text x="94" y="132" fill="#fff" font-size="13" font-weight="600">Step Framework</text>
  <text x="94" y="148" fill="#93c5fd" font-size="11">seq() · parallel() · .until() · drive_forward() · turn_right() · servo steps · sensor steps</text>
  <text x="750" y="132" text-anchor="end" fill="#60a5fa" font-size="10" font-style="italic">What you write</text>
  <text x="750" y="145" text-anchor="end" fill="#60a5fa" font-size="10" font-style="italic">in missions</text>

  <!-- Arrow -->
  <polygon points="400,172 394,180 406,180" fill="#475569" opacity="0.6"/>

