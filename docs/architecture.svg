  <rect x="40" y="184" rx="8" width="720" height="60" fill="#0891b2"/>
  <circle cx="70" cy="206" r="12" fill="#0e7490"/>
  <text x="70" y="211" text-anchor="middle" fill="#a5f3fc" font-size="12" font-weight="700">3</text>
  <text x="94" y="204" fill="#fff" font-size="13" font-weight="600">Motion &amp; Control</text>
  <text x="94" y="220" fill="#67e8f9" font-size="11">Drive · Motion planner · Kinematics (differential &amp; mecanum) · Odometry · Calibration</text>
  <text x="750" y="204" text-anchor="end" fill="#22d3ee" font-size="10" font-style="italic">PID · feedforward</text>
  <text x="750" y="217" text-anchor="end" fill="#22d3ee" font-size="10" font-style="italic">IMU fusion</text>

  <!-- Arrow -->
  <polygon points="400,244 394,252 406,252" fill="#475569" opacity="0.6"/>

