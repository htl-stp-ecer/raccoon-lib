  <rect x="40" y="256" rx="8" width="720" height="60" fill="#059669"/>
  <circle cx="70" cy="278" r="12" fill="#047857"/>
  <text x="70" y="283" text-anchor="middle" fill="#a7f3d0" font-size="12" font-weight="700">2</text>
  <text x="94" y="276" fill="#fff" font-size="13" font-weight="600">Foundation</text>
  <text x="94" y="292" fill="#6ee7b7" font-size="11">PidController · Feedforward · AxisConstraints · Timing · Logging (spdlog)</text>
  <text x="750" y="276" text-anchor="end" fill="#34d399" font-size="10" font-style="italic">Core primitives</text>
  <text x="750" y="289" text-anchor="end" fill="#34d399" font-size="10" font-style="italic">shared across all layers</text>

  <!-- Arrow -->
  <polygon points="400,316 394,324 406,324" fill="#475569" opacity="0.6"/>

