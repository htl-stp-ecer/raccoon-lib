  <text x="94" y="348" fill="#fff" font-size="13" font-weight="600">Hardware Abstraction Layer &amp; Platform</text>
  <text x="94" y="364" fill="#fde68a" font-size="11">Motor · Servo · IMU · AnalogSensor · DigitalSensor  —  Wombat / Raspberry Pi ARM64</text>
  <text x="750" y="348" text-anchor="end" fill="#fbbf24" font-size="10" font-style="italic">KIPR Wombat</text>
  <text x="750" y="361" text-anchor="end" fill="#fbbf24" font-size="10" font-style="italic">hardware drivers</text>

  <!-- Footer -->
  <text x="400" y="406" text-anchor="middle" fill="#334155" font-size="10" letter-spacing="3" font-weight="600">htl-stp-ecer / raccoon-lib</text>

