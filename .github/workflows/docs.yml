name: Docs

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes doxygen

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt

      - name: Build Doxygen
        working-directory: docs
        run: |
          mkdir -p _build/doxygen
          doxygen Doxyfile

      - name: Build Sphinx HTML
        working-directory: docs
        run: make html

      - name: Stage GitHub Pages site
        run: |
          mkdir -p site
          cp -R docs/_build/html/. site/
          mkdir -p site/doxygen
          cp -R docs/_build/doxygen/html/. site/doxygen/

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site

      - name: Add viewing instructions
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## Documentation

          The built documentation is attached as the **docs-site** artifact above.

          **To view locally:**
          1. Download and unzip the `docs-site` artifact
          2. Open a terminal in the extracted folder
          3. Run a local server:
             ```bash
             python3 -m http.server 8000
             ```
          4. Open [http://localhost:8000](http://localhost:8000) in your browser
             - Sphinx docs: [http://localhost:8000](http://localhost:8000)
             - Doxygen API docs: [http://localhost:8000/doxygen](http://localhost:8000/doxygen)
          EOF
