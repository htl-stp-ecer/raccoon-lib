name: Build & Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
          clean: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Build library ---
      - name: Clean old wheels
        run: find build-docker -name '*.whl' -delete 2>/dev/null || true

      - name: Build ARM64 wheel
        run: |
          SKIP_TESTS=1 \
          BUILD_NUMBER=${{ github.run_number }} \
          BUILD_JOBS=4 \
          bash build.sh

      - name: Determine version
        id: version
        run: |
          WHL=$(find build-docker -name '*.whl' -type f -exec ls -t {} + | head -1)
          VERSION=$(basename "$WHL" | sed 's/^libstp-//;s/-.*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "wheel=$WHL" >> "$GITHUB_OUTPUT"
          echo "wheel_name=$(basename "$WHL")" >> "$GITHUB_OUTPUT"

      # --- Generate stubs wheel (universal, works on any platform) ---
      - name: Generate stubs and build universal wheel
        run: |
          WHL_NAME=$(basename "${{ steps.version.outputs.wheel }}")
          VERSION="${{ steps.version.outputs.version }}"

          docker run --rm --platform=linux/arm64/v8 \
            -v "$PWD":/src -w /src \
            libstp-dev:arm64 bash -lc "
              set -euo pipefail

              # Install the built wheel + stubgen
              pip install --quiet pybind11-stubgen /src/build-docker/$WHL_NAME

              # Generate .pyi stubs from the compiled C++ bindings
              rm -rf /src/stubs-staging
              pybind11-stubgen libstp -o /src/stubs-staging --ignore-all-errors 2>/dev/null || true

              # Merge pure Python source into the stubs package so IDEs
              # can resolve the full API (DSL steps, helpers, etc.)
              SITE=\$(python -c 'import libstp, pathlib; print(pathlib.Path(libstp.__file__).parent)')
              find \"\$SITE\" -name '*.py' | while read py; do
                REL=\${py#\$SITE/}
                DEST=/src/stubs-staging/libstp/\$REL
                mkdir -p \$(dirname \$DEST)
                # Only copy if no .pyi already exists for this module
                PYI=/src/stubs-staging/libstp/\${REL%.py}.pyi
                if [ ! -f \"\$PYI\" ]; then
                  cp \"\$py\" \"\$DEST\"
                fi
              done

              # Add py.typed marker so IDEs recognize this as a typed package
              touch /src/stubs-staging/libstp/py.typed

              # Write pyproject.toml for the stubs wheel
              cat > /src/stubs-staging/pyproject.toml << PYEOF
          [build-system]
          requires = [\"setuptools\"]
          build-backend = \"setuptools.build_meta\"

          [project]
          name = \"libstp-stubs\"
          version = \"$VERSION\"
          description = \"Type stubs and Python source for libstp (IDE support, no C++ bindings)\"
          requires-python = \">=3.11\"

          [tool.setuptools.packages.find]
          include = [\"libstp*\"]

          [tool.setuptools.package-data]
          libstp = [\"*.pyi\", \"py.typed\", \"**/*.pyi\"]
          PYEOF

              # Build the universal wheel
              pip install --quiet build
              cd /src/stubs-staging
              python -m build --wheel --outdir /src/build-docker-stubs
            "

          echo "✓ Stubs wheel built"
          ls -la build-docker-stubs/*.whl

      # --- Build docs ---
      - name: Build documentation
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            python:3.11-slim \
            bash -c '
              set -euo pipefail
              apt-get update && apt-get install --yes --no-install-recommends doxygen make zip graphviz
              pip install --no-cache-dir -r docs/requirements.txt

              # Clean previous build artifacts
              rm -rf docs/_build docs-site

              # Build Doxygen (C++ API docs)
              cd docs
              mkdir -p _build/doxygen
              doxygen Doxyfile
              echo "Doxygen: $(find _build/doxygen/html -name "*.html" | wc -l) HTML files"

              # Build Sphinx (Python docs)
              make html
              echo "Sphinx: $(find _build/html -name "*.html" | wc -l) HTML files"

              # Generate DSL step catalog
              python3 /workspace/docs/generate_dsl_catalog.py
              cd ..

              # Package into zip
              mkdir -p docs-site
              cp -R docs/_build/html/. docs-site/
              mkdir -p docs-site/doxygen
              cp -R docs/_build/doxygen/html/. docs-site/doxygen/
              cp docs/_build/dsl-steps.json docs-site/
              cd docs-site
              zip -r ../libstp-docs-'"${{ steps.version.outputs.version }}"'.zip .
            '

      # --- Release ---
      - name: Bundle release assets
        run: |
          rm -rf release-bundle
          mkdir -p release-bundle
          cp "${{ steps.version.outputs.wheel }}" release-bundle/
          cp install.py release-bundle/
          cd release-bundle
          tar czf ../libstp-${{ steps.version.outputs.version }}.tar.gz *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: libstp ${{ steps.version.outputs.version }}
          body: |
            Automated release from commit ${{ github.sha }}.

            **Install on Raspberry Pi:**
            ```bash
            tar xzf libstp-${{ steps.version.outputs.version }}.tar.gz
            RPI_HOST=<your-pi-ip> python3 install.py
            ```

            **Install on laptop (any platform — for codegen & IDE support):**
            ```bash
            pip install libstp_stubs-${{ steps.version.outputs.version }}-py3-none-any.whl
            ```
            This universal wheel works on Windows, macOS, and Linux.
            Use `raccoon update` to install automatically.

            **View documentation:**
            1. Download and unzip `libstp-docs-${{ steps.version.outputs.version }}.zip`
            2. Run `python3 -m http.server 8000` in the extracted folder
            3. Open http://localhost:8000 (Sphinx) or http://localhost:8000/doxygen (API docs)
          files: |
            libstp-${{ steps.version.outputs.version }}.tar.gz
            ${{ steps.version.outputs.wheel }}
            build-docker-stubs/*.whl
            libstp-docs-${{ steps.version.outputs.version }}.zip

      - name: Trigger documentation rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/htl-stp-ecer/documentation/dispatches \
            -d '{"event_type":"library-release","client_payload":{"version":"${{ steps.version.outputs.version }}"}}'
