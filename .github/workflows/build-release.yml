name: Build & Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Wombat (ARM64 Pi) wheel — self-hosted runner ---
  build-wombat:
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
          clean: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean old wheels
        run: find build-docker -name '*.whl' -delete 2>/dev/null || true

      - name: Build ARM64 Wombat wheel
        run: |
          SKIP_TESTS=1 \
          BUILD_NUMBER=${{ github.run_number }} \
          BUILD_JOBS=4 \
          bash build.sh

      - name: Determine version
        id: version
        run: |
          WHL=$(find build-docker -name '*.whl' -type f -exec ls -t {} + | head -1)
          VERSION=$(basename "$WHL" | sed 's/^libstp-//;s/-.*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload wombat wheel
        uses: actions/upload-artifact@v4
        with:
          name: wombat-wheel
          path: build-docker/*.whl

      - name: Build documentation
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            python:3.11-slim \
            bash -c '
              set -euo pipefail
              apt-get update && apt-get install --yes --no-install-recommends doxygen make zip graphviz
              pip install --no-cache-dir -r docs/requirements.txt

              # Clean previous build artifacts
              rm -rf docs/_build docs-site

              # Build Doxygen (C++ API docs)
              cd docs
              mkdir -p _build/doxygen
              doxygen Doxyfile
              echo "Doxygen: $(find _build/doxygen/html -name "*.html" | wc -l) HTML files"

              # Build Sphinx (Python docs)
              make html
              echo "Sphinx: $(find _build/html -name "*.html" | wc -l) HTML files"

              # Generate DSL step catalog
              python3 /workspace/docs/generate_dsl_catalog.py
              cd ..

              # Package into zip
              mkdir -p docs-site
              cp -R docs/_build/html/. docs-site/
              mkdir -p docs-site/doxygen
              cp -R docs/_build/doxygen/html/. docs-site/doxygen/
              cp docs/_build/dsl-steps.json docs-site/
              cd docs-site
              zip -r ../libstp-docs-'"${{ steps.version.outputs.version }}"'.zip .
            '

      - name: Upload docs zip
        uses: actions/upload-artifact@v4
        with:
          name: docs-zip
          path: libstp-docs-*.zip

    outputs:
      version: ${{ steps.version.outputs.version }}

  # --- Mock wheels (all laptop platforms via cibuildwheel) ---
  build-mock:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13, windows-latest]

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Patch version and generate code
        shell: bash
        run: |
          # Patch version with build number
          ORIG=$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml)
          BASE="${ORIG%.*}"
          NEW="${BASE}.${{ github.run_number }}"
          sed -i.bak "s/^version = .*/version = \"$NEW\"/" pyproject.toml
          # Same for raccoon-transport
          RORIG=$(sed -n 's/^version = "\([^"]*\)"/\1/p' raccoon-transport/python/pyproject.toml)
          RBASE="${RORIG%.*}"
          RNEW="${RBASE}.${{ github.run_number }}"
          sed -i.bak "s/^version = .*/version = \"$RNEW\"/" raccoon-transport/python/pyproject.toml
          # Generate step builders
          python tools/generate_step_builders.py

      - name: Build mock wheels
        uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_BUILD: "cp313-*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "auto"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_CONFIG_SETTINGS: "cmake.args=-DDRIVER_BUNDLE=mock"
          CIBW_BEFORE_BUILD: "pip install scikit-build-core pybind11 cmake"

      - name: Rename wheels to libstp_mock
        shell: bash
        run: |
          for f in wheelhouse/libstp-*; do
            mv "$f" "${f/libstp-/libstp_mock-}"
          done

      - name: Upload mock wheels
        uses: actions/upload-artifact@v4
        with:
          name: mock-wheel-${{ matrix.os }}
          path: wheelhouse/*.whl

  # --- Create release from all artifacts ---
  release:
    needs: [build-wombat, build-mock]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (for install.py)
        uses: actions/checkout@v4
        with:
          sparse-checkout: install.py

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Bundle Pi release tarball
        run: |
          mkdir -p release-bundle
          cp artifacts/wombat-wheel/*.whl release-bundle/
          cp install.py release-bundle/
          cd release-bundle
          tar czf ../libstp-${{ needs.build-wombat.outputs.version }}.tar.gz *

      - name: Collect mock wheels
        run: |
          mkdir -p mock-wheels
          cp artifacts/mock-wheel-*/*.whl mock-wheels/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-wombat.outputs.version }}
          name: libstp ${{ needs.build-wombat.outputs.version }}
          body: |
            Automated release from commit ${{ github.sha }}.

            **Install on Raspberry Pi (Wombat platform):**
            ```bash
            tar xzf libstp-${{ needs.build-wombat.outputs.version }}.tar.gz
            RPI_HOST=<your-pi-ip> python3 install.py
            ```

            **Install on laptop (Mock platform — codegen & indexing, no hardware needed):**
            ```bash
            pip install <libstp_mock wheel for your platform>
            ```
            Mock wheels are available for Linux x86_64, macOS (ARM64 & Intel), and Windows.

            **View documentation:**
            1. Download and unzip `libstp-docs-${{ needs.build-wombat.outputs.version }}.zip`
            2. Run `python3 -m http.server 8000` in the extracted folder
            3. Open http://localhost:8000 (Sphinx) or http://localhost:8000/doxygen (API docs)
          files: |
            libstp-${{ needs.build-wombat.outputs.version }}.tar.gz
            artifacts/wombat-wheel/*.whl
            mock-wheels/*.whl
            artifacts/docs-zip/*.zip

      - name: Trigger documentation rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/htl-stp-ecer/documentation/dispatches \
            -d '{"event_type":"library-release","client_payload":{"version":"${{ needs.build-wombat.outputs.version }}"}}'
