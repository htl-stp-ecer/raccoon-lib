name: Build & Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
          clean: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # --- Build Wombat (ARM64) wheel ---
      - name: Clean old build artifacts
        run: |
          find build-docker -name '*.whl' -delete 2>/dev/null || true
          # Clean mock build dirs completely to avoid cross-platform cache contamination
          rm -rf build-docker-mock _skbuild-docker-mock .cmake-cache-docker-mock

      - name: Build ARM64 Wombat wheel
        run: |
          SKIP_TESTS=1 \
          BUILD_NUMBER=${{ github.run_number }} \
          BUILD_JOBS=4 \
          bash build.sh

      - name: Determine version
        id: version
        run: |
          WHL=$(find build-docker -name '*.whl' -type f -exec ls -t {} + | head -1)
          VERSION=$(basename "$WHL" | sed 's/^libstp-//;s/-.*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "wombat_wheel=$WHL" >> "$GITHUB_OUTPUT"
          echo "wombat_wheel_name=$(basename "$WHL")" >> "$GITHUB_OUTPUT"

      # --- Build Mock wheel (same platform, mock drivers) ---
      - name: Build Mock wheel
        run: |
          SKIP_TESTS=1 \
          BUILD_NUMBER=${{ github.run_number }} \
          BUILD_JOBS=4 \
          IMAGE_NAME=libstp-dev:mock \
          BUILD_DIR=build-docker-mock \
          SKBUILD_DIR=_skbuild-docker-mock \
          FETCHCONTENT_DIR=.cmake-cache-docker-mock \
          EXTRA_CMAKE_ARGS="-DDRIVER_BUNDLE=mock" \
          bash build.sh

      - name: Locate mock wheel
        id: mock
        run: |
          WHL=$(find build-docker-mock -name '*.whl' -type f -exec ls -t {} + | head -1)
          BASENAME=$(basename "$WHL")
          # Rename to include -mock suffix for clarity
          MOCK_NAME="${BASENAME/libstp-/libstp_mock-}"
          cp "$WHL" "build-docker-mock/$MOCK_NAME"
          echo "mock_wheel=build-docker-mock/$MOCK_NAME" >> "$GITHUB_OUTPUT"
          echo "mock_wheel_name=$MOCK_NAME" >> "$GITHUB_OUTPUT"

      # --- Build docs ---
      - name: Build documentation
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            python:3.11-slim \
            bash -c '
              set -euo pipefail
              apt-get update && apt-get install --yes --no-install-recommends doxygen make zip graphviz
              pip install --no-cache-dir -r docs/requirements.txt

              # Clean previous build artifacts
              rm -rf docs/_build docs-site

              # Build Doxygen (C++ API docs)
              cd docs
              mkdir -p _build/doxygen
              doxygen Doxyfile
              echo "Doxygen: $(find _build/doxygen/html -name "*.html" | wc -l) HTML files"

              # Build Sphinx (Python docs)
              make html
              echo "Sphinx: $(find _build/html -name "*.html" | wc -l) HTML files"

              # Generate DSL step catalog
              python3 /workspace/docs/generate_dsl_catalog.py
              cd ..

              # Package into zip
              mkdir -p docs-site
              cp -R docs/_build/html/. docs-site/
              mkdir -p docs-site/doxygen
              cp -R docs/_build/doxygen/html/. docs-site/doxygen/
              cp docs/_build/dsl-steps.json docs-site/
              cd docs-site
              zip -r ../libstp-docs-'"${{ steps.version.outputs.version }}"'.zip .
            '

      # --- Release ---
      - name: Bundle release assets
        run: |
          rm -rf release-bundle
          mkdir -p release-bundle
          cp "${{ steps.version.outputs.wombat_wheel }}" release-bundle/
          cp install.py release-bundle/
          cd release-bundle
          tar czf ../libstp-${{ steps.version.outputs.version }}.tar.gz *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: libstp ${{ steps.version.outputs.version }}
          body: |
            Automated release from commit ${{ github.sha }}.

            **Install on Raspberry Pi (Wombat platform):**
            ```bash
            tar xzf libstp-${{ steps.version.outputs.version }}.tar.gz
            RPI_HOST=<your-pi-ip> python3 install.py
            ```

            **Install on laptop (Mock platform — codegen & indexing, no hardware needed):**
            ```bash
            pip install ${{ steps.mock.outputs.mock_wheel_name }}
            ```

            **View documentation:**
            1. Download and unzip `libstp-docs-${{ steps.version.outputs.version }}.zip`
            2. Run `python3 -m http.server 8000` in the extracted folder
            3. Open http://localhost:8000 (Sphinx) or http://localhost:8000/doxygen (API docs)
          files: |
            libstp-${{ steps.version.outputs.version }}.tar.gz
            ${{ steps.version.outputs.wombat_wheel }}
            ${{ steps.mock.outputs.mock_wheel }}
            libstp-docs-${{ steps.version.outputs.version }}.zip

      - name: Trigger documentation rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/htl-stp-ecer/documentation/dispatches \
            -d '{"event_type":"library-release","client_payload":{"version":"${{ steps.version.outputs.version }}"}}'
