name: Build & Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: self-hosted
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Ensure Docker (Colima) is running
        run: |
          if docker info >/dev/null 2>&1; then
            echo "Docker already running"
            exit 0
          fi

          echo "Docker not available, resetting Colima..."
          colima stop --force 2>/dev/null || true
          colima delete --force 2>/dev/null || true
          colima start --cpu 4 --memory 4 --disk 60
          docker context use colima 2>/dev/null || true
          docker info > /dev/null
          echo "Docker is ready"

      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
          clean: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Build library ---
      - name: Clean old build artifacts
        run: |
          find build-docker -name '*.whl' -delete 2>/dev/null || true
          # Use Docker to clean dirs created by containers (owned by root)
          docker run --rm -v "$PWD":/src alpine sh -c \
            "rm -rf /src/build-docker-stubs /src/build-docker-mock /src/.cmake-cache-docker-mock /src/_skbuild-docker-mock"

      - name: Build ARM64 wheel
        run: |
          SKIP_TESTS=1 \
          BUILD_NUMBER=${{ github.run_number }} \
          BUILD_JOBS=4 \
          bash build.sh

      - name: Determine version
        id: version
        run: |
          WHL=$(find build-docker -name '*.whl' -type f -exec ls -t {} + | head -1)
          VERSION=$(basename "$WHL" | sed 's/^raccoon-//;s/-.*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "wheel=$WHL" >> "$GITHUB_OUTPUT"
          echo "wheel_name=$(basename "$WHL")" >> "$GITHUB_OUTPUT"

      # --- Generate stubs wheel (universal, works on any platform) ---
      - name: Build mock-platform wheel for stub generation
        run: |
          SKIP_TESTS=1 \
          BUILD_NUMBER=${{ github.run_number }} \
          BUILD_JOBS=4 \
          BUILD_DIR=build-docker-mock \
          SKBUILD_DIR=_skbuild-docker-mock \
          FETCHCONTENT_DIR=.cmake-cache-docker-mock \
          EXTRA_CMAKE_ARGS="-DDRIVER_BUNDLE=mock" \
          bash build.sh

      - name: Generate stubs and build universal wheel
        run: |
          MOCK_WHL=$(find build-docker-mock -name '*.whl' -type f | head -1)
          VERSION="${{ steps.version.outputs.version }}"

          docker run --rm --platform=linux/arm64/v8 \
            -v "$PWD":/src -w /src \
            libstp-dev:arm64 bash -lc "
              set -euo pipefail
              pip install --quiet pybind11-stubgen 'mypy>=1.15' /src/raccoon-transport/python /src/$MOCK_WHL
              bash /src/scripts/build-stubs.sh $VERSION
            "

          echo "✓ Stubs wheel built"
          ls -la build-docker-stubs/*.whl

      # --- Publish stubs to PyPI (trusted publisher via OIDC) ---
      - name: Mint PyPI token from OIDC
        id: pypi-token
        run: |
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=pypi" | jq -r '.value')
          PYPI_TOKEN=$(curl -sS -X POST https://pypi.org/_/oidc/mint-token \
            -H "Content-Type: application/json" \
            -d "{\"token\": \"$OIDC_TOKEN\"}" | jq -r '.token')
          echo "::add-mask::$PYPI_TOKEN"
          echo "token=$PYPI_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Publish raccoon-stubs to PyPI
        run: |
          docker run --rm \
            -v "$PWD/build-docker-stubs":/dist \
            -e TWINE_USERNAME=__token__ \
            -e TWINE_PASSWORD="$PYPI_TOKEN" \
            python:3.11-slim bash -c '
              pip install --quiet twine
              twine upload /dist/*.whl
            '
        env:
          PYPI_TOKEN: ${{ steps.pypi-token.outputs.token }}

      # --- Build docs ---
      - name: Build documentation
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            python:3.11-slim \
            bash -c '
              set -euo pipefail
              apt-get update && apt-get install --yes --no-install-recommends doxygen make zip graphviz
              pip install --no-cache-dir -r docs/requirements.txt

              # Clean previous build artifacts
              rm -rf docs/_build docs-site

              # Build Doxygen (C++ API docs)
              cd docs
              mkdir -p _build/doxygen
              doxygen Doxyfile
              echo "Doxygen: $(find _build/doxygen/html -name "*.html" | wc -l) HTML files"

              # Build Sphinx (Python docs)
              make html
              echo "Sphinx: $(find _build/html -name "*.html" | wc -l) HTML files"

              # Generate DSL step catalog
              python3 /workspace/docs/generate_dsl_catalog.py
              cd ..

              # Package into zip
              mkdir -p docs-site
              cp -R docs/_build/html/. docs-site/
              mkdir -p docs-site/doxygen
              cp -R docs/_build/doxygen/html/. docs-site/doxygen/
              cp docs/_build/dsl-steps.json docs-site/
              cd docs-site
              zip -r ../raccoon-docs-'"${{ steps.version.outputs.version }}"'.zip .
            '

      # --- Release ---
      - name: Bundle release assets
        run: |
          rm -rf release-bundle
          mkdir -p release-bundle
          cp "${{ steps.version.outputs.wheel }}" release-bundle/
          cp install.py release-bundle/
          cd release-bundle
          tar czf ../raccoon-${{ steps.version.outputs.version }}.tar.gz *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: raccoon ${{ steps.version.outputs.version }}
          body: |
            Automated release from commit ${{ github.sha }}.

            **Install on Raspberry Pi:**
            ```bash
            tar xzf raccoon-${{ steps.version.outputs.version }}.tar.gz
            RPI_HOST=<your-pi-ip> python3 install.py
            ```

            **Install on laptop (any platform — for codegen & IDE support):**
            ```bash
            pip install raccoon-stubs==${{ steps.version.outputs.version }}
            ```
            Or from the release asset:
            ```bash
            pip install raccoon_stubs-${{ steps.version.outputs.version }}-py3-none-any.whl
            ```
            Use `raccoon update` to install automatically.

            **View documentation:**
            1. Download and unzip `raccoon-docs-${{ steps.version.outputs.version }}.zip`
            2. Run `python3 -m http.server 8000` in the extracted folder
            3. Open http://localhost:8000 (Sphinx) or http://localhost:8000/doxygen (API docs)
          files: |
            raccoon-${{ steps.version.outputs.version }}.tar.gz
            ${{ steps.version.outputs.wheel }}
            build-docker-stubs/*.whl
            raccoon-docs-${{ steps.version.outputs.version }}.zip

      - name: Trigger documentation rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/htl-stp-ecer/documentation/dispatches \
            -d '{"event_type":"library-release","client_payload":{"version":"${{ steps.version.outputs.version }}"}}'
