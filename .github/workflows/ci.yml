name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether non-doc files changed — skip release on doc-only pushes.
  changes:
    runs-on: ubuntu-latest
    outputs:
      has-code: ${{ steps.check.outputs.has-code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - id: check
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD)
          if echo "$changed" | grep -qvE '^(docs/|.*\.md$|TESTING_DEBT\.md$|\.github/workflows/test\.yml$)'; then
            echo "has-code=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-code=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 90
    env:
      IS_DEPENDABOT_PR: ${{ github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' }}
      CCACHE_HOST_DIR: ${{ github.workspace }}/.gha-cache/ccache
      PIP_CACHE_HOST_DIR: ${{ github.workspace }}/.gha-cache/pip

    steps:
      - name: Checkout with submodules
        if: env.IS_DEPENDABOT_PR != 'true'
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}
          clean: false

      - name: Skip self-hosted tests for Dependabot PRs
        if: env.IS_DEPENDABOT_PR == 'true'
        run: echo "Skipping self-hosted test job for Dependabot pull requests because org secrets are not exposed there."

      - name: Clean stale test build artifacts
        if: env.IS_DEPENDABOT_PR != 'true'
        run: |
          rm -rf .cmake-cache-docker-test
          rm -rf _skbuild-docker-test
          rm -rf build-test

      - name: Restore compiler and package caches
        if: env.IS_DEPENDABOT_PR != 'true'
        uses: actions/cache/restore@v5
        with:
          path: |
            .gha-cache/ccache
            .gha-cache/pip
          key: ci-tool-cache-${{ runner.os }}-${{ runner.arch }}-native-${{ hashFiles('.github/docker/Dockerfile', 'build.sh') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ci-tool-cache-${{ runner.os }}-${{ runner.arch }}-native-

      - name: Run native test suite
        if: env.IS_DEPENDABOT_PR != 'true'
        run: |
          IMAGE_NAME="libstp-dev:test"
          mkdir -p "$CCACHE_HOST_DIR" "$PIP_CACHE_HOST_DIR"

          DOCKERFILE_HASH=$(sha256sum .github/docker/Dockerfile | cut -c1-12)
          VERSIONED_IMAGE="libstp-dev:test-${DOCKERFILE_HASH}"
          if ! docker image inspect "$VERSIONED_IMAGE" >/dev/null 2>&1; then
            echo "Dockerfile changed (hash $DOCKERFILE_HASH) — rebuilding image..."
            docker build -f .github/docker/Dockerfile -t "$VERSIONED_IMAGE" .
            docker tag "$VERSIONED_IMAGE" "$IMAGE_NAME"
          else
            echo "Reusing cached image $VERSIONED_IMAGE"
            docker tag "$VERSIONED_IMAGE" "$IMAGE_NAME"
          fi

          run_docker() {
            docker run --rm \
              -v "$PWD":/src \
              -v "$CCACHE_HOST_DIR":/ccache \
              -v "$PIP_CACHE_HOST_DIR":/pip-cache \
              -e CCACHE_DIR=/ccache \
              -e CCACHE_MAXSIZE=3G \
              -e CCACHE_COMPRESS=1 \
              -e CCACHE_BASEDIR=/src \
              -e CCACHE_NOHASHDIR=1 \
              -e CCACHE_COMPILERCHECK=content \
              -e PIP_CACHE_DIR=/pip-cache/root-cache \
              -w /src \
              "$IMAGE_NAME" bash -lc "mkdir -p \"\$PIP_CACHE_DIR\" && chown 0:0 \"\$PIP_CACHE_DIR\" && $1"
          }

          run_docker "
            set -euo pipefail

            echo '::group::Install build dependencies'
            pip install --disable-pip-version-check -U 'scikit-build-core>=0.10' pybind11 'cmake>=3.27' numpy pytest-rerunfailures
            echo '::endgroup::'

            echo '::group::Build editable package + test binaries'
            pip install /src/raccoon-transport/python
            CMAKE_BUILD_PARALLEL_LEVEL=$(nproc) pip install -e /src \
              --no-build-isolation \
              --config-settings=build-dir=/src/_skbuild-docker-test \
              --config-settings=cmake.define.LIBSTP_BUILD_TESTS=ON \
              --config-settings=cmake.define.DRIVER_BUNDLE=mock \
              --config-settings=cmake.define.LIBSTP_RUN_MYPY=OFF \
              --config-settings=cmake.define.CMAKE_BUILD_TYPE=Release \
              --config-settings=cmake.define.FETCHCONTENT_BASE_DIR=/src/.cmake-cache-docker-test \
              --config-settings=cmake.define.CMAKE_CXX_COMPILER_LAUNCHER=ccache \
              --config-settings=cmake.define.CMAKE_C_COMPILER_LAUNCHER=ccache
            echo '::endgroup::'

            echo '::group::Run C++ tests'
            ctest --test-dir /src/_skbuild-docker-test --output-on-failure -E MockSimIntegration
            echo '::endgroup::'

            echo '::group::Run fast Python tests (skip sim + known-broken)'
            python -m pytest tests/python \
              --ignore=tests/python/sim \
              --ignore=tests/python/test_calibrate_distance.py \
              --ignore=tests/python/test_input_validation.py \
              --ignore=tests/python/test_resource_conflicts.py \
              --ignore=tests/python/test_watchdog.py \
              --ignore=tests/python/test_stubs.py \
              --ignore=tests/python/testing/test_plugin_end_to_end.py \
              -ra --showlocals -x \
              -W ignore::pytest.PytestAssertRewriteWarning
            echo '::endgroup::'

            echo '::group::Run sim tests (excluding auto-tune)'
            python -m pytest tests/python/sim \
              --ignore=tests/python/sim/test_auto_tune.py \
              -ra --showlocals \
              --reruns 1 --reruns-delay 2 \
              -W ignore::pytest.PytestAssertRewriteWarning
            echo '::endgroup::'

            echo '::group::Run auto-tune sim tests'
            python -m pytest tests/python/sim/test_auto_tune.py \
              -ra --showlocals -v \
              --reruns 1 --reruns-delay 2 \
              -W ignore::pytest.PytestAssertRewriteWarning
            echo '::endgroup::'
          "

          run_docker "ccache --show-stats"
          echo "✓ Native C++ and Python tests passed"

      - name: Save compiler and package caches
        if: always() && env.IS_DEPENDABOT_PR != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            .gha-cache/ccache
            .gha-cache/pip
          key: ci-tool-cache-${{ runner.os }}-${{ runner.arch }}-native-${{ hashFiles('.github/docker/Dockerfile', 'build.sh') }}-${{ github.run_id }}-${{ github.run_attempt }}

  # ─── ARM64 release wheel (for Raspberry Pi / Wombat) ──────────────────────
  build:
    runs-on: [self-hosted, Linux, X64]
    needs: [test, changes]
    # Only release on push to main, and only when non-doc files changed.
    if: github.event_name == 'push' && needs.changes.outputs.has-code == 'true'
    permissions:
      contents: write
    env:
      CCACHE_HOST_DIR: ${{ github.workspace }}/.gha-cache/ccache
      PIP_CACHE_HOST_DIR: ${{ github.workspace }}/.gha-cache/pip
      DOCKER_BUILDX_CACHE_DIR: ${{ github.workspace }}/.gha-cache/buildx

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}
          clean: false

      - name: Restore release tool caches
        uses: actions/cache/restore@v5
        with:
          path: |
            .gha-cache/ccache
            .gha-cache/pip
            .gha-cache/buildx
          key: ci-tool-cache-${{ runner.os }}-${{ runner.arch }}-arm64-${{ hashFiles('.github/docker/Dockerfile', 'build.sh') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ci-tool-cache-${{ runner.os }}-${{ runner.arch }}-arm64-

      - name: Install host tools
        run: sudo apt-get install -y --no-install-recommends jq

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Clean old build artifacts and release caches
        run: |
          rm -rf .cmake-cache-docker
          rm -rf _skbuild-docker
          rm -rf build-docker
          rm -rf docs/_build docs-site release-bundle
          docker run --rm -v "$PWD":/src alpine sh -c \
            "rm -rf /src/.cmake-cache-docker /src/_skbuild-docker /src/build-docker /src/docs/_build /src/docs-site /src/release-bundle"

      - name: Build ARM64 wheel
        run: |
          SKIP_TESTS=1 \
          BUILD_NUMBER=${{ github.run_number }} \
          BUILD_JOBS=$(nproc) \
          bash build.sh
          docker run --rm --platform=linux/arm64/v8 \
            -v "$CCACHE_HOST_DIR":/ccache \
            -e CCACHE_DIR=/ccache \
            libstp-dev:arm64 ccache --show-stats

      - name: Determine version
        id: version
        run: |
          WHL=$(find build-docker -name '*.whl' -type f -exec ls -t {} + | head -1)
          VERSION=$(basename "$WHL" | sed 's/^raccoon_lib-//;s/-.*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "wheel=$WHL" >> "$GITHUB_OUTPUT"
          echo "wheel_name=$(basename "$WHL")" >> "$GITHUB_OUTPUT"

      - name: Build documentation
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            python:3.11-slim \
            bash -c '
              set -euo pipefail
              apt-get update && apt-get install --yes --no-install-recommends doxygen make zip graphviz
              pip install --no-cache-dir -r docs/requirements.txt

              rm -rf docs/_build docs-site

              cd docs
              mkdir -p _build/doxygen
              doxygen Doxyfile
              echo "Doxygen: $(find _build/doxygen/html -name "*.html" | wc -l) HTML files"

              make html
              echo "Sphinx: $(find _build/html -name "*.html" | wc -l) HTML files"

              python3 /workspace/docs/generate_dsl_catalog.py
              cd ..

              mkdir -p docs-site
              cp -R docs/_build/html/. docs-site/
              mkdir -p docs-site/doxygen
              cp -R docs/_build/doxygen/html/. docs-site/doxygen/
              cp docs/_build/dsl-steps.json docs-site/
              cd docs-site
              zip -r ../raccoon-docs-'"${{ steps.version.outputs.version }}"'.zip .
            '

      - name: Bundle release assets
        run: |
          rm -rf release-bundle
          mkdir -p release-bundle
          cp "${{ steps.version.outputs.wheel }}" release-bundle/
          cp install.py release-bundle/
          cd release-bundle
          tar czf ../raccoon-${{ steps.version.outputs.version }}.tar.gz *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: raccoon ${{ steps.version.outputs.version }}
          body: |
            Automated release from commit ${{ github.sha }}.

            **Install on Raspberry Pi:**
            ```bash
            tar xzf raccoon-${{ steps.version.outputs.version }}.tar.gz
            RPI_HOST=<your-pi-ip> python3 install.py
            ```

            **Install on laptop (any platform — for development & IDE support):**
            ```bash
            pip install raccoon-lib==${{ steps.version.outputs.version }}
            ```

            **View documentation:**
            1. Download and unzip `raccoon-docs-${{ steps.version.outputs.version }}.zip`
            2. Run `python3 -m http.server 8000` in the extracted folder
            3. Open http://localhost:8000 (Sphinx) or http://localhost:8000/doxygen (API docs)
          files: |
            raccoon-${{ steps.version.outputs.version }}.tar.gz
            ${{ steps.version.outputs.wheel }}
            raccoon-docs-${{ steps.version.outputs.version }}.zip

      - name: Trigger documentation rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/htl-stp-ecer/documentation/dispatches \
            -d '{"event_type":"library-release","client_payload":{"version":"${{ steps.version.outputs.version }}"}}'

      - name: Trigger raccoon-image bundle
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/htl-stp-ecer/raccoon-image/dispatches \
            -d '{"event_type":"component-released","client_payload":{"component":"raccoon-lib","version":"${{ steps.version.outputs.version }}"}}'

      - name: Save release tool caches
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            .gha-cache/ccache
            .gha-cache/pip
            .gha-cache/buildx
          key: ci-tool-cache-${{ runner.os }}-${{ runner.arch }}-arm64-${{ hashFiles('.github/docker/Dockerfile', 'build.sh') }}-${{ github.run_id }}-${{ github.run_attempt }}

  # ─── Multi-platform wheels for PyPI (Win / Linux x86_64 / macOS) ──────────
  build-wheels:
    name: Wheels • ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [test, changes]
    if: github.event_name == 'push' && needs.changes.outputs.has-code == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT || github.token }}

      # FetchContent deps (pybind11, LCM, spdlog, yaml-cpp, eigen) are
      # fetched once and reused across runs. Keyed on CMakeLists so they
      # refresh when a dep version bumps.
      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: .cmake-cache
          key: cmake-deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('CMakeLists.txt', 'raccoon-transport/CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ runner.os }}-${{ runner.arch }}-

      # ccache persists compiled objects across workflow runs on Linux/macOS.
      # On the first run everything is a miss; afterwards incremental changes
      # are fast. Windows uses MSVC's own incremental build instead.
      - name: Cache ccache (Linux / macOS)
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: .cibw-ccache
          key: cibw-ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.sha }}
          restore-keys: cibw-ccache-${{ runner.os }}-${{ runner.arch }}-

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: cp311-* cp312-* cp313-*
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
          # macOS: build a single universal2 wheel (arm64 + x86_64 merged by lipo)
          CIBW_ARCHS_MACOS: universal2
          # manylinux_2_28 = AlmaLinux 8, supports C++20 and glibc 2.28+
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BUILD_VERBOSITY: 1

          # raccoon-transport is a pure-Python runtime dep (LCM message types).
          # Install it from the checked-out submodule before each wheel build.
          CIBW_BEFORE_BUILD: pip install {project}/raccoon-transport/python

          # ── Install ccache in the manylinux container ──────────────────────
          CIBW_BEFORE_ALL_LINUX: dnf install -y ccache
          CIBW_BEFORE_ALL_MACOS: brew install ccache

          # ── Per-platform environment: ccache wired up for Linux / macOS ───
          # On Linux the project is bind-mounted at /project inside the
          # manylinux container, so /project/.cibw-ccache maps to the
          # workspace directory that actions/cache will persist.
          CIBW_ENVIRONMENT_LINUX: >-
            CCACHE_DIR=/project/.cibw-ccache
            CCACHE_MAXSIZE=2G
            CCACHE_COMPRESS=1
            CCACHE_NOHASHDIR=1
          CIBW_ENVIRONMENT_MACOS: >-
            CCACHE_DIR={project}/.cibw-ccache
            CCACHE_MAXSIZE=2G
            CCACHE_COMPRESS=1
            CCACHE_NOHASHDIR=1

          # ── CMake config settings per platform ────────────────────────────
          # DRIVER_BUNDLE=mock — no wombat hardware deps, builds everywhere.
          # LIBSTP_RUN_RUFF/MYPY=OFF — linting is the test job's concern.
          # ccache launcher wired in on Linux and macOS only.
          CIBW_CONFIG_SETTINGS_LINUX: >-
            cmake.define.DRIVER_BUNDLE=mock
            cmake.define.LIBSTP_RUN_RUFF=OFF
            cmake.define.LIBSTP_RUN_MYPY=OFF
            cmake.define.CMAKE_CXX_COMPILER_LAUNCHER=ccache
            cmake.define.CMAKE_C_COMPILER_LAUNCHER=ccache
          CIBW_CONFIG_SETTINGS_MACOS: >-
            cmake.define.DRIVER_BUNDLE=mock
            cmake.define.LIBSTP_RUN_RUFF=OFF
            cmake.define.LIBSTP_RUN_MYPY=OFF
            cmake.define.CMAKE_CXX_COMPILER_LAUNCHER=ccache
            cmake.define.CMAKE_C_COMPILER_LAUNCHER=ccache
          CIBW_CONFIG_SETTINGS_WINDOWS: >-
            cmake.define.DRIVER_BUNDLE=mock
            cmake.define.LIBSTP_RUN_RUFF=OFF
            cmake.define.LIBSTP_RUN_MYPY=OFF

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ─── Publish all platform wheels to PyPI ──────────────────────────────────
  publish-pypi:
    name: Publish raccoon-lib to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels]
    # Run only when every matrix variant of build-wheels succeeded.
    if: always() && needs.build-wheels.result == 'success'
    permissions:
      id-token: write

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Show wheels to be published
        run: ls -la dist/

      - name: Publish to PyPI (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
