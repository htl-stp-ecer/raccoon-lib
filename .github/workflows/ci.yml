name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether non-doc files changed — skip release on doc-only pushes.
  changes:
    runs-on: ubuntu-latest
    outputs:
      has-code: ${{ steps.check.outputs.has-code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - id: check
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD)
          if echo "$changed" | grep -qvE '^(docs/|.*\.md$|TESTING_DEBT\.md$|\.github/workflows/test\.yml$)'; then
            echo "has-code=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-code=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    runs-on: self-hosted
    timeout-minutes: 90

    steps:
      - name: Ensure Docker (Colima) is running
        run: |
          if docker info >/dev/null 2>&1; then
            echo "Docker already running"
            exit 0
          fi
          echo "Docker not available, resetting Colima..."
          colima stop --force 2>/dev/null || true
          colima delete --force 2>/dev/null || true
          colima start --cpu 4 --memory 4 --disk 60
          docker context use colima 2>/dev/null || true
          docker info > /dev/null
          echo "Docker is ready"

      - name: Checkout with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
          clean: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run C++ tests
        run: |
          PLATFORM="linux/arm64/v8"
          IMAGE_NAME="libstp-dev:arm64"
          CCACHE_VOL="libstp-ccache"
          PIP_CACHE_VOL="libstp-pip-cache"

          docker volume create "$CCACHE_VOL" >/dev/null 2>&1 || true
          docker volume create "$PIP_CACHE_VOL" >/dev/null 2>&1 || true

          # Rebuild the dev image only when the Dockerfile changes.
          # Tag includes a hash of the Dockerfile so stale images are
          # never reused; unrelated runs share the cache.
          DOCKERFILE_HASH=$(sha256sum Dockerfile | cut -c1-12)
          VERSIONED_IMAGE="libstp-dev:arm64-${DOCKERFILE_HASH}"
          if ! docker image inspect "$VERSIONED_IMAGE" >/dev/null 2>&1; then
            echo "Dockerfile changed (hash $DOCKERFILE_HASH) — rebuilding image..."
            docker buildx build \
              --platform "$PLATFORM" \
              --load -t "$VERSIONED_IMAGE" .
            docker tag "$VERSIONED_IMAGE" "$IMAGE_NAME"
          else
            echo "Reusing cached image $VERSIONED_IMAGE"
            docker tag "$VERSIONED_IMAGE" "$IMAGE_NAME"
          fi

          run_docker() {
            docker run --rm --platform "$PLATFORM" \
              -v "$PWD":/src \
              -v "$CCACHE_VOL":/ccache \
              -v "$PIP_CACHE_VOL":/pip-cache \
              -e PIP_CACHE_DIR=/pip-cache \
              -w /src \
              "$IMAGE_NAME" bash -lc "$1"
          }

          echo "::group::Install build dependencies"
          run_docker "pip install --disable-pip-version-check -U 'scikit-build-core>=0.10' pybind11 'cmake>=3.27'"
          echo "::endgroup::"

          echo "::group::Build C++ tests"
          run_docker "cmake -B /src/build-test -G Ninja \
            -DLIBSTP_BUILD_TESTS=ON \
            -DLIBSTP_RUN_MYPY=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DFETCHCONTENT_BASE_DIR=/src/.cmake-cache-docker-test"
          run_docker "ninja -C /src/build-test -j4"
          echo "::endgroup::"

          echo "Running C++ tests..."
          # MockSimIntegration is excluded because it segfaults during singleton
          # teardown between test cases. This is a real bug in MockPlatform,
          # not a test bug. Tracked in TESTING_DEBT.md — fix before claiming
          # full test coverage.
          run_docker "ctest --test-dir /src/build-test --output-on-failure -E MockSimIntegration"
          echo "✓ C++ tests passed (MockSimIntegration excluded — see TESTING_DEBT.md)"

      - name: Run Python tests
        run: |
          PLATFORM="linux/arm64/v8"
          IMAGE_NAME="libstp-dev:arm64"
          CCACHE_VOL="libstp-ccache"
          PIP_CACHE_VOL="libstp-pip-cache"
          FETCHCONTENT_DIR=".cmake-cache-docker-test"

          run_docker() {
            docker run --rm --platform "$PLATFORM" \
              -v "$PWD":/src \
              -v "$CCACHE_VOL":/ccache \
              -v "$PIP_CACHE_VOL":/pip-cache \
              -e PIP_CACHE_DIR=/pip-cache \
              -e LIBSTP_TIMING_ENABLED=0 \
              -w /src \
              "$IMAGE_NAME" bash -lc "$1"
          }

          run_docker "
            set -euo pipefail

            echo '::group::Install mock-bundle wheel'
            pip install --disable-pip-version-check -U 'scikit-build-core>=0.10' pybind11 'cmake>=3.27'
            pip install /src/raccoon-transport/python
            CMAKE_BUILD_PARALLEL_LEVEL=4 pip install -e /src \
              --no-build-isolation \
              --config-settings=cmake.define.DRIVER_BUNDLE=mock \
              --config-settings=cmake.define.FETCHCONTENT_BASE_DIR=/src/$FETCHCONTENT_DIR \
              --config-settings=cmake.define.LIBSTP_RUN_MYPY=OFF
            echo '::endgroup::'

            echo '::group::Run fast Python tests (skip sim + known-broken)'
            python -m pytest tests/python \
              --ignore=tests/python/sim \
              --ignore=tests/python/test_calibrate_distance.py \
              --ignore=tests/python/test_input_validation.py \
              --ignore=tests/python/test_resource_conflicts.py \
              --ignore=tests/python/test_watchdog.py \
              --ignore=tests/python/testing/test_plugin_end_to_end.py \
              -ra --showlocals -x \
              -W ignore::pytest.PytestAssertRewriteWarning
            echo '::endgroup::'

            echo '::group::Run sim tests (excluding auto-tune)'
            python -m pytest tests/python/sim \
              --ignore=tests/python/sim/test_auto_tune.py \
              -ra --showlocals \
              -W ignore::pytest.PytestAssertRewriteWarning
            echo '::endgroup::'

            echo '::group::Run auto-tune sim tests'
            python -m pytest tests/python/sim/test_auto_tune.py \
              -ra --showlocals -v \
              -W ignore::pytest.PytestAssertRewriteWarning
            echo '::endgroup::'
          "

          echo "✓ Python tests passed"

  build:
    runs-on: self-hosted
    needs: [test, changes]
    # Only release on push to main, and only when non-doc files changed.
    if: github.event_name == 'push' && needs.changes.outputs.has-code == 'true'
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Ensure Docker (Colima) is running
        run: |
          if docker info >/dev/null 2>&1; then
            echo "Docker already running"
            exit 0
          fi

          echo "Docker not available, resetting Colima..."
          colima stop --force 2>/dev/null || true
          colima delete --force 2>/dev/null || true
          colima start --cpu 4 --memory 4 --disk 60
          docker context use colima 2>/dev/null || true
          docker info > /dev/null
          echo "Docker is ready"

      - name: Checkout with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GH_PAT }}
          clean: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Clean old build artifacts
        run: |
          find build-docker -name '*.whl' -delete 2>/dev/null || true
          docker run --rm -v "$PWD":/src alpine sh -c \
            "rm -rf /src/build-docker-stubs /src/build-docker-mock /src/.cmake-cache-docker-mock /src/_skbuild-docker-mock"

      - name: Build ARM64 wheel
        run: |
          SKIP_TESTS=1 \
          BUILD_NUMBER=${{ github.run_number }} \
          BUILD_JOBS=4 \
          bash build.sh

      - name: Determine version
        id: version
        run: |
          WHL=$(find build-docker -name '*.whl' -type f -exec ls -t {} + | head -1)
          VERSION=$(basename "$WHL" | sed 's/^raccoon-//;s/-.*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "wheel=$WHL" >> "$GITHUB_OUTPUT"
          echo "wheel_name=$(basename "$WHL")" >> "$GITHUB_OUTPUT"

      - name: Build mock-platform wheel for stub generation
        run: |
          SKIP_TESTS=1 \
          BUILD_NUMBER=${{ github.run_number }} \
          BUILD_JOBS=4 \
          BUILD_DIR=build-docker-mock \
          SKBUILD_DIR=_skbuild-docker-mock \
          FETCHCONTENT_DIR=.cmake-cache-docker-mock \
          EXTRA_CMAKE_ARGS="-DDRIVER_BUNDLE=mock" \
          bash build.sh

      - name: Generate stubs and build universal wheel
        run: |
          MOCK_WHL=$(find build-docker-mock -name '*.whl' -type f | head -1)
          VERSION="${{ steps.version.outputs.version }}"

          docker run --rm --platform=linux/arm64/v8 \
            -v "$PWD":/src -w /src \
            libstp-dev:arm64 bash -lc "
              set -euo pipefail
              pip install --quiet pybind11-stubgen 'mypy>=1.15' /src/raccoon-transport/python /src/$MOCK_WHL
              bash /src/scripts/build-stubs.sh $VERSION
            "

          echo "✓ Stubs wheel built"
          ls -la build-docker-stubs/*.whl

      - name: Mint PyPI token from OIDC
        id: pypi-token
        run: |
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=pypi" | jq -r '.value')
          PYPI_TOKEN=$(curl -sS -X POST https://pypi.org/_/oidc/mint-token \
            -H "Content-Type: application/json" \
            -d "{\"token\": \"$OIDC_TOKEN\"}" | jq -r '.token')
          echo "::add-mask::$PYPI_TOKEN"
          echo "token=$PYPI_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Publish raccoon-stubs to PyPI
        run: |
          docker run --rm \
            -v "$PWD/build-docker-stubs":/dist \
            -e TWINE_USERNAME=__token__ \
            -e TWINE_PASSWORD="$PYPI_TOKEN" \
            python:3.11-slim bash -c '
              pip install --quiet twine
              twine upload /dist/*.whl
            '
        env:
          PYPI_TOKEN: ${{ steps.pypi-token.outputs.token }}

      - name: Build documentation
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            python:3.11-slim \
            bash -c '
              set -euo pipefail
              apt-get update && apt-get install --yes --no-install-recommends doxygen make zip graphviz
              pip install --no-cache-dir -r docs/requirements.txt

              rm -rf docs/_build docs-site

              cd docs
              mkdir -p _build/doxygen
              doxygen Doxyfile
              echo "Doxygen: $(find _build/doxygen/html -name "*.html" | wc -l) HTML files"

              make html
              echo "Sphinx: $(find _build/html -name "*.html" | wc -l) HTML files"

              python3 /workspace/docs/generate_dsl_catalog.py
              cd ..

              mkdir -p docs-site
              cp -R docs/_build/html/. docs-site/
              mkdir -p docs-site/doxygen
              cp -R docs/_build/doxygen/html/. docs-site/doxygen/
              cp docs/_build/dsl-steps.json docs-site/
              cd docs-site
              zip -r ../raccoon-docs-'"${{ steps.version.outputs.version }}"'.zip .
            '

      - name: Bundle release assets
        run: |
          rm -rf release-bundle
          mkdir -p release-bundle
          cp "${{ steps.version.outputs.wheel }}" release-bundle/
          cp install.py release-bundle/
          cd release-bundle
          tar czf ../raccoon-${{ steps.version.outputs.version }}.tar.gz *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: raccoon ${{ steps.version.outputs.version }}
          body: |
            Automated release from commit ${{ github.sha }}.

            **Install on Raspberry Pi:**
            ```bash
            tar xzf raccoon-${{ steps.version.outputs.version }}.tar.gz
            RPI_HOST=<your-pi-ip> python3 install.py
            ```

            **Install on laptop (any platform — for codegen & IDE support):**
            ```bash
            pip install raccoon-stubs==${{ steps.version.outputs.version }}
            ```
            Or from the release asset:
            ```bash
            pip install raccoon_stubs-${{ steps.version.outputs.version }}-py3-none-any.whl
            ```
            Use `raccoon update` to install automatically.

            **View documentation:**
            1. Download and unzip `raccoon-docs-${{ steps.version.outputs.version }}.zip`
            2. Run `python3 -m http.server 8000` in the extracted folder
            3. Open http://localhost:8000 (Sphinx) or http://localhost:8000/doxygen (API docs)
          files: |
            raccoon-${{ steps.version.outputs.version }}.tar.gz
            ${{ steps.version.outputs.wheel }}
            build-docker-stubs/*.whl
            raccoon-docs-${{ steps.version.outputs.version }}.zip

      - name: Trigger documentation rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/htl-stp-ecer/documentation/dispatches \
            -d '{"event_type":"library-release","client_payload":{"version":"${{ steps.version.outputs.version }}"}}'

      - name: Trigger raccoon-image bundle
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/htl-stp-ecer/raccoon-image/dispatches \
            -d '{"event_type":"component-released","client_payload":{"component":"raccoon-lib","version":"${{ steps.version.outputs.version }}"}}'
