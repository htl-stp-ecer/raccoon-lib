name: Cleanup Runner

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: self-hosted

    steps:
      - name: Disk usage (before)
        run: df -h || true

      - name: Docker factory reset
        run: |
          echo "=== Docker status before ==="
          docker system df 2>&1 || echo "Docker is corrupted"
          docker info 2>&1 | head -5 || true

          # Quit Docker Desktop completely
          osascript -e 'quit app "Docker"' 2>/dev/null || true
          pkill -f Docker 2>/dev/null || true
          sleep 5

          # Nuke ALL Docker data — this is the only way to fix corrupted containerd blobs
          echo "Wiping Docker data directories..."
          rm -rf ~/Library/Containers/com.docker.docker/Data/vms 2>/dev/null || true
          rm -rf ~/Library/Containers/com.docker.docker/Data/docker.raw.sock 2>/dev/null || true
          rm -rf ~/.docker/buildx 2>/dev/null || true
          rm -rf ~/.docker/contexts 2>/dev/null || true

          # Restart Docker Desktop
          echo "Starting Docker Desktop..."
          open -a Docker

          # Wait for Docker to be ready (up to 60s)
          for i in $(seq 1 20); do
            if docker info >/dev/null 2>&1; then
              echo "Docker is ready after ~$((i * 3))s"
              break
            fi
            sleep 3
          done

          echo "=== Docker status after ==="
          docker system df 2>&1 || echo "Docker still unhealthy"
          docker info 2>&1 | head -5 || true
        continue-on-error: true

      - name: Clean workspace build artifacts
        run: |
          cd "${{ github.workspace }}" 2>/dev/null || cd ~/actions-runner/_work/raccoon-lib/raccoon-lib 2>/dev/null || true
          echo "Workspace: $(pwd)"
          echo "Before: $(du -sh . 2>/dev/null || echo unknown)"

          rm -rf build-docker build-docker-mock build-docker-stubs
          rm -rf _skbuild* .cmake-cache*
          rm -rf docs/_build docs-site
          rm -rf release-bundle
          rm -f libstp-*.tar.gz libstp-docs-*.zip

          echo "After: $(du -sh . 2>/dev/null || echo unknown)"
        continue-on-error: true

      - name: Remove iOS Simulator runtimes
        run: |
          echo "=== Simulator runtimes before ==="
          xcrun simctl runtime list 2>/dev/null || true
          # Delete all simulator runtimes
          xcrun simctl runtime delete all 2>/dev/null || true
          # Delete all simulator devices
          xcrun simctl delete all 2>/dev/null || true
          # Remove CoreSimulator caches and runtime images
          rm -rf ~/Library/Developer/CoreSimulator/Caches/* 2>/dev/null || true
          rm -rf /Library/Developer/CoreSimulator/Cryptex/Images/* 2>/dev/null || true
          rm -rf /Library/Developer/CoreSimulator/Volumes/* 2>/dev/null || true
          echo "=== Simulator runtimes after ==="
          xcrun simctl runtime list 2>/dev/null || true
        continue-on-error: true

      - name: Clean runner temp files
        run: |
          rm -rf /tmp/docker-* /tmp/buildx-* /tmp/qemu-* 2>/dev/null || true
          rm -rf /tmp/containerd* 2>/dev/null || true
          # Clean Actions runner temp
          rm -rf ~/actions-runner/_work/_temp/* 2>/dev/null || true
          rm -rf ~/actions-runner/_work/_tool/* 2>/dev/null || true
          echo "Temp files cleaned"
        continue-on-error: true

      - name: Disk usage (after)
        run: df -h || true

      - name: Docker status
        run: docker system df 2>&1 || echo "Docker still unhealthy"
        continue-on-error: true
