# To use:
#
#     pre-commit run -a
#
# Or, to install both pre-commit and pre-push gates in this clone:
#
#     pre-commit install --hook-type pre-commit --hook-type pre-push
#
# To update this file:
#
#     pre-commit autoupdate
#
# See https://github.com/pre-commit/pre-commit

ci:
  autoupdate_commit_msg: "chore: update pre-commit hooks"
  autofix_commit_msg: "style: pre-commit fixes"

# Install both stages by default — `pre-commit install` alone now wires
# clang-tidy into pre-push without requiring the --hook-type flag.
default_install_hook_types: [pre-commit, pre-push]

repos:
# Standard hooks
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: check-added-large-files
  - id: check-case-conflict
  - id: check-merge-conflict
  - id: check-symlinks
  - id: check-yaml
  - id: debug-statements
  - id: end-of-file-fixer
  - id: mixed-line-ending
  - id: requirements-txt-fixer
  - id: trailing-whitespace

# Check linting and style issues
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: "v0.7.3"
  hooks:
    - id: ruff
      args: ["--fix", "--show-fixes"]
    - id: ruff-format
      exclude: ^(docs)

# Changes tabs to spaces
- repo: https://github.com/Lucas-C/pre-commit-hooks
  rev: v1.5.5
  hooks:
  - id: remove-tabs
    exclude: ^(docs)

# CMake formatting
- repo: https://github.com/cheshirekow/cmake-format-precommit
  rev: v0.6.13
  hooks:
  - id: cmake-format
    additional_dependencies: [pyyaml]
    types: [file]
    files: (\.cmake|CMakeLists.txt)(.in)?$

# Verify auto-generated step-builder DSL files are up to date with their
# @dsl_step source classes. Catches drift before it lands in main and
# avoids "works on my machine" failures from stale generated wrappers.
- repo: local
  hooks:
    - id: check-step-builders
      name: Check step-builder DSL files are in sync
      language: system
      entry: python3 tools/generate_step_builders.py --check
      pass_filenames: false
      files: '(^modules/.*/python/raccoon/.*\.py$|^tools/generate_step_builders\.py$|^python/raccoon/codegen/.*\.py$)'

# C++ static analysis (clang-tidy) runs as a pre-PUSH gate, not pre-commit.
# Reasoning: clang-tidy needs compile_commands.json, which only exists after
# `cmake -B <dir>`. Running it on every commit would surface stale-build
# noise that trains contributors to ignore the output. Pre-push is the right
# point — by the time you're pushing, you've usually built locally — and the
# wrapper auto-refreshes compile_commands.json (cmake configure only, no
# rebuild) when the file is missing or doesn't cover the changed sources.
#
# Skip in an emergency with `SKIP_CLANG_TIDY=1 git push`. Override the diff
# base or build dir with UPSTREAM=<ref> / BUILD_DIR=<dir>. CI runs the
# original `scripts/run-clang-tidy.sh` against the full source tree as the
# authoritative gate.
- repo: local
  hooks:
    - id: clang-tidy-prepush
      name: clang-tidy (changed C++ files vs upstream)
      stages: [pre-push]
      language: system
      entry: bash scripts/clang-tidy-prepush.sh
      pass_filenames: false
      always_run: true
